<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - Lite Search</title>
  <link rel="stylesheet" href="/static/css/style.css" />
</head>
<body class="login-body">

  <div class="login-card glass">
    <svg class="welcome-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width: 48px; height: 48px; color: var(--accent); margin-bottom: 20px; display: inline-block;"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><line x1="21.17" y1="8" x2="12" y2="8"/><line x1="3.95" y1="6.06" x2="8.54" y2="14"/><line x1="10.88" y1="21.94" x2="15.46" y2="14"/></svg>
    <h1>Lite Search</h1>
    <p>Sign in to access your research sessions.</p>

    {% if error %}
    <div style="background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: #FCA5A5; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 0.85rem;">{{ error }}</div>
    {% endif %}

    <form method="POST" class="login-form">
      <div style="display: flex; flex-direction: column; gap: 8px;">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus>
      </div>
      
      <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 16px;">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required>
      </div>

      <button type="submit" class="btn-primary" id="login-btn" style="margin-top: 24px;">Login to Dashboard</button>
    </form>

    <div style="margin-top: 32px; font-size: 0.75rem; color: var(--text-secondary);">
      Default: <code style="font-family: 'JetBrains Mono'; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px;">admin</code> / <code style="font-family: 'JetBrains Mono'; background: rgba(0,0,0,0.3); padding: 2px 4px; border-radius: 4px;">research123</code>
    </div>
  </div>

  <script>
    document.querySelector('.login-form').addEventListener('submit', function() {
      const btn = document.getElementById('login-btn');
      btn.style.opacity = '0.7';
      btn.textContent = 'Authenticating...';
    });
  </script>
</body>
</html>
